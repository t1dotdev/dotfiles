# A "select" action like "Open Repo on GitHub": pick a folder under ~/.config from
# the fuzzy list, open it in nvim in a new pane (split right, focused).
#
# Options are STATIC (herdr-plus select lists can't be generated at runtime), so
# this list is a snapshot of ~/.config. Regenerate when folders change:
#   cd ~/.config && ls -d */ | sed 's#/$##' | awk '{printf "\n[[options]]\nlabel = \"%s\"\nvalue = \"%s\"\n", $0, $0}'
# ...and paste below, replacing the [[options]] blocks.

name = "Edit ~/.config in nvim"
description = "Pick a ~/.config folder and edit it in nvim"
type = "select"
command = "herdr pane split {{.PaneId}} --direction right --cwd ~/.config/{{.Value}} --focus | grep -oE '\"pane_id\":\"[^\"]+\"' | head -1 | cut -d'\"' -f4 | xargs -I{} herdr pane run {} 'nvim .'"

