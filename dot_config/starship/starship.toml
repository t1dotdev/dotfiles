"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = "t1"

format = """
$directory\
${custom.git}\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$character
"""
right_format = """$all"""

[directory]
style = 'bold white'
format = "[ $path ]($style)"
truncation_length = 4


[custom.git]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
shell = 'sh'
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = " "
style = "fg:primary "
format =  "  [$symbol$branch]($style) "

[character]
success_symbol = "[➜](bold fg:primary)"
error_symbol = '[➜](bold red) '
# success_symbol = '[❯](bold primary)'
# error_symbol = '[❯](bold red)'


[palettes.t1]
