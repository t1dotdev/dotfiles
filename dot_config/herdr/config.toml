onboarding = false
[terminal]
default_shell = "nu"
new_cwd = "follow"
[keys]
prefix = "ctrl+;"
split_vertical = "prefix+|"
# ctrl+h/j/k/l handled by vim-herdr-navigation plugin (see [[keys.command]] below)
focus_pane_left = ["prefix+h"]
focus_pane_down = ["prefix+j"]
focus_pane_up = ["prefix+k"]
focus_pane_right = ["prefix+l"]
navigate_workspace_up = ["ctrl+alt+k"]
navigate_workspace_down = ["ctrl+alt+j"]
next_agent = ["prefix+]"]
previous_agent = ["prefix+["]
goto = "prefix+s"
settings = "prefix+shift+s"
switch_tab = "prefix+1..9"
focus_agent = "prefix+ctrl+1..9"

[ui]
agent_panel_sort = "spaces"
prompt_new_tab_name = false

[theme.custom]
accent = "#7A6FF0"
panel_bg = "reset"
surface0 = "#161B22"
surface1 = "#8B949E"

overlay0 = "#8B949E"
overlay1 = "#7A6FF0"

text = "#e6e0f0"
subtext0 = "#9AA4B2"

surface_dim = "#1C2128"

mauve = "#7A6FF0"
green = "#a6e3a1"
yellow = "#f9e2af"
red = "#f38ba8"
blue = "#89b4fa"
teal = "#94e2d5"
peach = "#fab387"


[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "run lazygit"

[[keys.command]]
key = "prefix+y"
type = "pane"
command = "yazi"
description = "run yazi"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"

[[keys.command]]
key = "prefix+p"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects picker"

[[keys.command]]
key = "prefix+a"
type = "plugin_action"
command = "cloudmanic.herdr-plus.quick-actions"
description = "herdr-plus: quick actions"

# Workspace switch via shift+digit. Terminal sends the shifted SYMBOL (US layout:
# shift+1=! shift+3=# shift+4=$ shift+5=%), not shift+digit, so bind the symbol.
[[keys.command]]
key = "prefix+!"
type = "shell"
command = "herdr workspace focus 1"
description = "switch workspace 1"

[[keys.command]]
key = "prefix+#"
type = "shell"
command = "herdr workspace focus 3"
description = "switch workspace 3"

[[keys.command]]
key = "prefix+$"
type = "shell"
command = "herdr workspace focus 4"
description = "switch workspace 4"

[[keys.command]]
key = "prefix+%"
type = "shell"
command = "herdr workspace focus 5"
description = "switch workspace 5"

[[keys.command]]
key = "prefix+@"
type = "shell"
command = "herdr workspace focus 2"
description = "switch workspace 2"

[[keys.command]]
key = "prefix+^"
type = "shell"
command = "herdr workspace focus 6"
description = "switch workspace 6"

[[keys.command]]
key = "prefix+&"
type = "shell"
command = "herdr workspace focus 7"
description = "switch workspace 7"

[[keys.command]]
key = "prefix+*"
type = "shell"
command = "herdr workspace focus 8"
description = "switch workspace 8"

[[keys.command]]
key = "prefix+("
type = "shell"
command = "herdr workspace focus 9"
description = "switch workspace 9"

[ui.toast]
delivery = "herdr"
